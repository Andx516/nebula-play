<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Empresa | Nebula</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="/pages/company.html"><span class="brand__star">✦</span><span>Nebula</span></a>
        <nav class="nav-links">
          <a class="nav-link active" href="/pages/company.html">Panel empresa</a>
          <button class="nav-link logout js-logout">Cerrar sesión</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-header">
        <h1>Panel de Empresa</h1>
        <p>Gestiona tu perfil, vacantes y candidatos</p>
      </section>

      <section class="company-grid">
        <aside class="card sidebar">
          <nav>
            <button class="btn btn-secondary active" data-tab="perfil">Perfil</button>
            <button class="btn btn-secondary" data-tab="vacantes">Bolsa de trabajo</button>
            <button class="btn btn-secondary" data-tab="candidatos">Candidatos</button>
            <button class="btn btn-secondary" data-tab="soporte">Atención al cliente</button>
          </nav>
        </aside>

        <section>
          <article id="tab-perfil" class="card section-card">
            <h2 class="section-title">Perfil de empresa</h2>
            <form id="companyProfileForm" class="form-grid">
              <div class="field"><label>Nombre de la empresa</label><input class="input" name="nombre_empresa" id="companyName" /></div>
              <div class="field"><label>Descripción</label><textarea class="textarea" name="descripcion" id="companyDescription"></textarea></div>
              <div class="form-grid form-grid--2">
                <div class="field"><label>Misión</label><textarea class="textarea" name="mision" id="companyMission"></textarea></div>
                <div class="field"><label>Visión</label><textarea class="textarea" name="vision" id="companyVision"></textarea></div>
              </div>
              <div class="form-grid form-grid--2">
                <div class="field"><label>Clientes</label><textarea class="textarea" name="clientes" id="companyClients"></textarea></div>
                <div class="field"><label>Sedes</label><textarea class="textarea" name="sedes" id="companySites"></textarea></div>
              </div>
              <div id="companyProfileMessage" class="small"></div>
              <button class="btn btn-primary" type="submit">Guardar perfil</button>
            </form>
          </article>

          <article id="tab-vacantes" class="card section-card hidden">
            <h2 class="section-title">Mis vacantes</h2>
            <form id="vacancyForm" class="form-grid form-grid--2" style="margin-bottom:20px;">
              <div class="field"><label>Título de la vacante</label><input class="input" name="nombre_imagen" placeholder="Desarrollador Java / Diseñador UX/UI" /></div>
              <div class="field"><label>Imagen de vacante</label><input class="input" name="imagen_vacante" type="file" accept="image/*" required /></div>
              <button class="btn btn-primary" type="submit">Subir publicación</button>
              <div id="vacancyMessage" class="small"></div>
            </form>
            <div id="vacancyGallery" class="gallery"></div>
          </article>

          <article id="tab-candidatos" class="card section-card hidden">
            <h2 class="section-title">Candidatos</h2>
            <div id="candidateList" class="table-list"></div>
          </article>

          <article id="tab-soporte" class="card section-card hidden">
            <h2 class="section-title">Atención al cliente</h2>
            <p class="job-desc" id="companySupportText"></p>
          </article>
        </section>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const { $, $$, api, ensureAuth, bindLogout, toast } = window.Nebula;

    function showTab(tab) {
      ['perfil', 'vacantes', 'candidatos', 'soporte'].forEach((name) => {
        $(`#tab-${name}`).classList.toggle('hidden', name !== tab);
      });
      $$('[data-tab]').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === tab));
    }

    async function loadProfile() {
      const profile = await api('/api/company/profile');
      $('#companyName').value = profile?.nombre_empresa || '';
      $('#companyDescription').value = profile?.descripcion || '';
      $('#companyMission').value = profile?.mision || '';
      $('#companyVision').value = profile?.vision || '';
      $('#companyClients').value = profile?.clientes || '';
      $('#companySites').value = profile?.sedes || '';
    }

    async function loadVacancies() {
      const vacancies = await api('/api/company/vacancies');
      $('#vacancyGallery').innerHTML = vacancies.length ? vacancies.map((item) => `
        <article class="card vacancy-thumb">
          <img src="${item.imagen_url}" alt="${item.nombre_imagen}" />
          <strong>${item.nombre_imagen}</strong>
          <div class="small muted">${new Date(item.fecha_publicacion).toLocaleDateString('es-MX')}</div>
          <button class="btn btn-danger" data-delete-vacancy="${item.id_vacante}">Desactivar</button>
        </article>
      `).join('') : '<div class="upload-box">Aún no has subido vacantes.</div>';
      $$('[data-delete-vacancy]').forEach((btn) => btn.addEventListener('click', async () => {
        await api(`/api/company/vacancies/${btn.dataset.deleteVacancy}`, { method: 'DELETE' });
        await loadVacancies();
      }));
    }

    async function loadCandidates() {
      const rows = await api('/api/company/candidates');
      $('#candidateList').innerHTML = rows.length ? rows.map((item) => `
        <article class="row">
          <div class="row__main">
            <strong>${item.nombre_completo}</strong>
            <div class="muted">Vacante: ${item.vacante_titulo}</div>
            <div class="small muted">${item.experiencia_especialidad || 'Sin experiencia registrada'}</div>
            <div class="inline-actions" style="margin-top:12px;">
              <a class="btn btn-secondary" target="_blank" href="/api/candidate/cvs/${item.id_curriculum}/file">Ver CV</a>
              <button class="btn btn-light" data-status="visto" data-id="${item.id_postulacion}">Marcar visto</button>
              <button class="btn btn-primary" data-status="contactado" data-id="${item.id_postulacion}">Contactar</button>
              <button class="btn btn-danger" data-status="descartado" data-id="${item.id_postulacion}">Descartar</button>
            </div>
          </div>
          <span class="badge ${item.estado}">${item.estado}</span>
        </article>
      `).join('') : '<div class="upload-box">No hay candidatos por el momento.</div>';
      $$('[data-status]').forEach((btn) => btn.addEventListener('click', async () => {
        await api(`/api/company/applications/${btn.dataset.id}/status`, { method: 'PATCH', body: JSON.stringify({ estado: btn.dataset.status }) });
        await loadCandidates();
      }));
    }

    $('#companyProfileForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        await api('/api/company/profile', { method: 'PUT', body: JSON.stringify(window.Nebula.serializeForm(event.currentTarget)) });
        toast($('#companyProfileMessage'), 'Perfil actualizado.', 'success');
      } catch (error) {
        toast($('#companyProfileMessage'), error.message, 'error');
      }
    });

    $('#vacancyForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        await api('/api/company/vacancies', { method: 'POST', body: new FormData(event.currentTarget) });
        toast($('#vacancyMessage'), 'Vacante publicada.', 'success');
        event.currentTarget.reset();
        await loadVacancies();
      } catch (error) {
        toast($('#vacancyMessage'), error.message, 'error');
      }
    });

    $$('[data-tab]').forEach((btn) => btn.addEventListener('click', async () => {
      showTab(btn.dataset.tab);
      if (btn.dataset.tab === 'vacantes') await loadVacancies();
      if (btn.dataset.tab === 'candidatos') await loadCandidates();
    }));

    (async () => {
      const user = await ensureAuth(['empresa']);
      if (!user) return;
      bindLogout();
      const content = await api('/api/content');
      $('#companySupportText').innerHTML = `Correo: ${content.correo_contacto}<br>Teléfono: ${content.numero_telefono}<br><a class="btn btn-secondary" target="_blank" href="${content.whatsapp_chat_link || '#'}">Abrir WhatsApp</a>`;
      await loadProfile();
      showTab('perfil');
    })();
  </script>
</body>
</html>
