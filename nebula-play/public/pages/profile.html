<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | Nebula</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="/pages/profile.html"><span class="brand__star">✦</span><span>Nebula</span></a>
        <nav class="nav-links">
          <a class="nav-link" data-match="profile" href="/pages/profile.html">Usuario</a>
          <a class="nav-link" data-match="jobs" href="/pages/jobs.html">Bolsa de trabajo</a>
          <a class="nav-link" data-match="about" href="/pages/about.html">Acerca de nosotros</a>
          <a class="nav-link" data-match="contact" href="/pages/contact.html">Comunícate con nosotros</a>
          <a class="nav-link" data-match="support" href="/pages/support.html">Atención al cliente</a>
          <button class="nav-link logout js-logout">Cerrar sesión</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-header">
        <h1>Mi Perfil</h1>
        <p>Gestiona tu información profesional</p>
      </section>

      <section class="card profile-hero">
        <div class="profile-main">
          <div class="avatar" id="profileAvatar">👤</div>
          <div>
            <h2 class="profile-name" id="profileName">Cargando...</h2>
            <p class="profile-role" id="profileRole">Perfil profesional</p>
            <div class="info-grid">
              <div class="info-item"><span>✉</span><strong id="profileEmail"></strong></div>
              <div class="info-item"><span>🗓</span><strong id="profileBirth"></strong></div>
              <div class="info-item"><span>▣</span><strong id="profileSex"></strong></div>
              <div class="info-item"><span>◔</span><strong id="profileExpYears"></strong></div>
            </div>
          </div>
        </div>
        <div>
          <button id="editProfileBtn" class="btn btn-primary">Editar perfil</button>
        </div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Experiencia Laboral</h2>
        <div id="experienceCard" class="experience-item"></div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Currículum Vitae</h2>
        <form id="cvForm" class="form-grid form-grid--2" style="margin-bottom:18px;">
          <div class="field">
            <label for="cvTitle">Título del CV</label>
            <input class="input" id="cvTitle" name="titulo" placeholder="CV Frontend / CV General" />
          </div>
          <div class="field">
            <label for="cvFile">Archivo PDF</label>
            <input class="input" id="cvFile" name="curriculum" type="file" accept=".pdf,.doc,.docx" required />
          </div>
          <button class="btn btn-primary" type="submit">Subir CV</button>
          <div id="cvMessage" class="small"></div>
        </form>
        <div id="cvList" class="table-list"></div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Mis postulaciones</h2>
        <div id="applicationsList" class="table-list"></div>
      </section>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script>
    const { $, api, ensureAuth, bindLogout, toast, setActiveNav } = window.Nebula;

    function parseExperience(text = '') {
      const [first, ...rest] = text.split('.');
      return { title: first || 'Sin información', details: rest.join('.').trim() || 'Aún no agregas una descripción adicional.' };
    }

    function getYearsLabel(text = '') {
      const match = text.match(/(Sin experiencia|\d+ año|\d+ años|\d+ años o más)/i);
      return match ? match[0] : 'No especificado';
    }

    function renderApplications(apps) {
      const container = $('#applicationsList');
      if (!apps.length) {
        container.innerHTML = '<div class="upload-box">No has realizado postulaciones todavía.</div>';
        return;
      }
      container.innerHTML = apps.map((item) => `
        <article class="row">
          <div class="row__main">
            <strong>${item.vacante_titulo}</strong>
            <div class="muted">${item.nombre_empresa}</div>
            <div class="small muted">CV usado: ${item.curriculum_titulo}</div>
            <div class="small muted">${new Date(item.fecha_postulacion).toLocaleString('es-MX')}</div>
          </div>
          <span class="badge ${item.estado}">${item.estado}</span>
        </article>
      `).join('');
    }

    function renderCvs(cvs) {
      const list = $('#cvList');
      if (!cvs.length) {
        list.innerHTML = '<div class="upload-box">No has subido tu CV todavía.</div>';
        return;
      }
      list.innerHTML = cvs.map((cv) => `
        <article class="row">
          <div class="row__main">
            <strong>${cv.titulo}</strong>
            <div class="small muted">${cv.nombre_archivo || 'Archivo adjunto'}</div>
          </div>
          <div class="inline-actions">
            <a class="btn btn-secondary" target="_blank" href="/api/candidate/cvs/${cv.id_curriculum}/file">Ver archivo</a>
            <button class="btn btn-danger" data-delete-cv="${cv.id_curriculum}">Eliminar</button>
          </div>
        </article>
      `).join('');
      list.querySelectorAll('[data-delete-cv]').forEach((btn) => btn.addEventListener('click', async () => {
        try {
          await api(`/api/candidate/cvs/${btn.dataset.deleteCv}`, { method: 'DELETE' });
          await loadPage();
        } catch (error) {
          toast($('#cvMessage'), error.message, 'error');
        }
      }));
    }

    async function loadPage() {
      const profile = await api('/api/candidate/profile');
      const cvs = await api('/api/candidate/cvs');
      const applications = await api('/api/candidate/applications');

      const parsed = parseExperience(profile.experiencia_especialidad || '');
      $('#profileName').textContent = profile.nombre_completo;
      $('#profileRole').textContent = parsed.title;
      $('#profileEmail').textContent = profile.email;
      $('#profileBirth').textContent = profile.fecha_nacimiento;
      $('#profileSex').textContent = profile.sexo;
      $('#profileExpYears').textContent = getYearsLabel(profile.experiencia_especialidad || '');
      $('#experienceCard').innerHTML = `
        <div>
          <strong>${parsed.title}</strong>
          <div class="muted">${getYearsLabel(profile.experiencia_especialidad || '')}</div>
          <div class="small muted">${parsed.details}</div>
        </div>
        <button class="btn btn-light" id="quickEditBtn">Editar</button>
      `;
      $('#quickEditBtn').addEventListener('click', () => openEdit(profile));
      renderCvs(cvs);
      renderApplications(applications);
    }

    function openEdit(profile) {
      const newName = prompt('Nombre completo', profile.nombre_completo) || profile.nombre_completo;
      const newBirth = prompt('Fecha de nacimiento (YYYY-MM-DD)', profile.fecha_nacimiento) || profile.fecha_nacimiento;
      const newSex = prompt('Sexo', profile.sexo) || profile.sexo;
      const newExp = prompt('Experiencia / especialidad', profile.experiencia_especialidad || '') || profile.experiencia_especialidad;
      api('/api/candidate/profile', {
        method: 'PUT',
        body: JSON.stringify({ nombre_completo: newName, fecha_nacimiento: newBirth, sexo: newSex, experiencia_especialidad: newExp }),
      }).then(loadPage).catch((error) => alert(error.message));
    }

    $('#editProfileBtn').addEventListener('click', async () => {
      const profile = await api('/api/candidate/profile');
      openEdit(profile);
    });

    $('#cvForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        await api('/api/candidate/cvs', { method: 'POST', body: new FormData(event.currentTarget) });
        toast($('#cvMessage'), 'CV subido correctamente.', 'success');
        event.currentTarget.reset();
        await loadPage();
      } catch (error) {
        toast($('#cvMessage'), error.message, 'error');
      }
    });

    (async () => {
      const user = await ensureAuth(['postulante']);
      if (!user) return;
      bindLogout();
      setActiveNav();
      await loadPage();
    })();
  </script>
</body>
</html>
