<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Play | Iniciar sesión</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="hero-grid">
    <section class="hero-copy">
      <div class="brand"><span class="brand__star">✦</span><span>Nebula</span></div>
      <p class="lead">Conectando el talento con las oportunidades del futuro</p>
      <p class="sub">Tu plataforma de reclutamiento inteligente que impulsa carreras, conecta empresas y digitaliza el proceso de selección con una experiencia moderna.</p>
    </section>

    <section class="card panel auth-panel">
  <h2>Iniciar Sesión</h2>

  <form id="loginForm" class="stack">
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input
        class="input"
        id="email"
        name="email"
        type="email"
        placeholder="tu@email.com"
        required
      />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input
        class="input"
        id="password"
        name="password"
        type="password"
        placeholder="••••••••"
        required
      />
    </div>

    <div id="loginMessage" class="small"></div>

    <div class="auth-actions">
      <button class="btn btn-primary" type="submit">Iniciar sesión</button>
      <a class="btn btn-light" style="text-align:center" href="/pages/register-user.html">Nuevo usuario</a>
      <a class="btn btn-secondary" style="text-align:center" href="/pages/register-company.html">Registro para empresas</a>
    </div>
  </form>
</section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const { $, api, toast } = window.Nebula;
    $('#loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = $('#loginMessage');
      toast(message, 'Validando acceso...', 'notice');
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: $('#email').value.trim(),
            password: $('#password').value,
          }),
        });
        toast(message, 'Inicio de sesión exitoso. Redirigiendo...', 'success');
        window.location.href = data.redirect;
      } catch (error) {
        toast(message, error.message, 'error');
      }
    });
  </script>
</body>
</html>
